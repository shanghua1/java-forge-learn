function peLoad(lid){
    var s=practiceState[lid],item=s.items[s.current];
    document.getElementById('pepr'+lid).innerHTML='<strong>第 '+(s.current+1)+' 题：</strong> '+item.prompt;
    var ta=document.getElementById('peta'+lid);ta.value='';ta.disabled=false;
    document.getElementById('pefb'+lid).className='pe-fb';
    document.getElementById('perv'+lid).className='pe-rv';
    document.getElementById('penext'+lid).style.display='none';
    document.querySelector('#practice'+lid+' .pe-check').style.display='';
    document.getElementById('pep'+lid).textContent=(s.current+1)+' / '+s.items.length;
    peUpdateLines(lid);ta.focus();
}

function peUpdateLines(lid){
    if(CONTENT_CONFIG.practiceMode!=='code')return;
    var ta=document.getElementById('peta'+lid),ln=document.getElementById('peln'+lid);
    if(!ta||!ln)return;
    var lines=ta.value.split('\n'),h='';for(var i=1;i<=lines.length;i++)h+=i+'\n';ln.textContent=h;
}

function peKey(e,lid){
    if(CONTENT_CONFIG.practiceMode!=='code')return;
    var ta=document.getElementById('peta'+lid);if(!ta)return;
    var s=ta.selectionStart,end=ta.selectionEnd,val=ta.value;
    if(e.key==='Tab'){e.preventDefault();ta.value=val.substring(0,s)+'    '+val.substring(end);ta.selectionStart=ta.selectionEnd=s+4;peUpdateLines(lid);return}
    var pairs={'(':')','{':'}','[':']','"':'"',"'":"'"};
    if(pairs[e.key]&&s===end){e.preventDefault();ta.value=val.substring(0,s)+e.key+pairs[e.key]+val.substring(end);ta.selectionStart=ta.selectionEnd=s+1}
    if(e.key==='Enter'){e.preventDefault();var ls=val.lastIndexOf('\n',s-1)+1,indent='';for(var k=ls;k<s&&(val[k]===' '||val[k]==='\t');k++)indent+=val[k];var extra=(val.substring(0,s).replace(/\s+$/,'').slice(-1)==='{')?'    ':'';ta.value=val.substring(0,s)+'\n'+indent+extra+val.substring(end);ta.selectionStart=ta.selectionEnd=s+1+indent.length+extra.length;peUpdateLines(lid)}
}

function peCheckBrackets(code){
    var st=[],pairs={'(':')','{':'}','[':']'};
    for(var i=0;i<code.length;i++){var c=code[i];
        if(c==='/'&&i+1<code.length&&code[i+1]==='/'){while(i<code.length&&code[i]!=='\n')i++;continue}
        if('({['.indexOf(c)!==-1){st.push(c);continue}
        if('})]'.indexOf(c)!==-1){if(st.length===0)return'多余的 '+c;var top=st.pop();if(pairs[top]!==c)return top+' 和 '+c+' 不匹配'}
    }
    if(st.length>0)return st[st.length-1]+' 没有闭合';return null;
}

function peNormalize(code){return code.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').map(function(l){return l.trim()}).filter(function(l){return l.length>0}).join('\n')}

function peCheck(lid){
    var s=practiceState[lid],item=s.items[s.current],code=document.getElementById('peta'+lid).value,fb=document.getElementById('pefb'+lid);
    if(!code.trim()){fb.className='pe-fb show no';fb.innerHTML='请先写点内容～';return}
    if(CONTENT_CONFIG.practiceMode==='code'){var brErr=peCheckBrackets(code);if(brErr){fb.className='pe-fb show no';fb.innerHTML='括号问题：'+brErr;return}}
    // Support multiple answers separated by |
    var answers=item.answer.split('|').map(function(a){return peNormalize(a)});
    var normalized=peNormalize(code);
    if(answers.indexOf(normalized)!==-1){
        fb.className='pe-fb show ok';fb.innerHTML='✅ 完全正确！(☆▽☆)';
        document.getElementById('peta'+lid).disabled=true;
        document.querySelector('#practice'+lid+' .pe-check').style.display='none';
        document.getElementById('penext'+lid).style.display='';
        markPracticeDone(lid,s.current);
        if(item.review){var rv=document.getElementById('perv'+lid);rv.innerHTML='<div class="pe-rv-title">📝 解析</div><pre><code>'+esc(item.review)+'</code></pre>';rv.className='pe-rv show';rv.querySelectorAll('code').forEach(function(b){b.innerHTML=hl(b.textContent)})}
    }else{
        var el=answers[0].split('\n'),ul=normalized.split('\n');
        var msg='有差异：你 '+ul.length+' 行，答案 '+el.length+' 行';
        for(var i=0;i<Math.min(ul.length,el.length);i++){if(ul[i]!==el[i]){msg+='<br>第 '+(i+1)+' 行不同';break}}
        fb.className='pe-fb show no';fb.innerHTML=msg;
    }
}

function peHint(lid){var fb=document.getElementById('pefb'+lid);fb.className='pe-fb show hint';fb.innerHTML='💡 '+practiceState[lid].items[practiceState[lid].current].hint}
function peAnswer(lid){var s=practiceState[lid],fb=document.getElementById('pefb'+lid);fb.className='pe-fb show hint';fb.innerHTML='参考答案：<pre><code>'+esc(s.items[s.current].answer.split('|')[0])+'</code></pre>';fb.querySelectorAll('code').forEach(function(b){b.innerHTML=hl(b.textContent)})}
function peReset(lid){peLoad(lid)}
function peNext(lid){var s=practiceState[lid];if(s.current<s.items.length-1){s.current++;savePracticePos(lid,s.current);peLoad(lid)}else{var fb=document.getElementById('pefb'+lid);fb.className='pe-fb show ok';fb.innerHTML='所有练习完成！(≧▽≦)';document.getElementById('penext'+lid).style.display='none'}}

function restorePracticeState(lid){
    var p=loadProgress();if(!p.practiceDone)return;
    var s=practiceState[lid];if(!s)return;
    var maxDone=-1;for(var i=0;i<s.items.length;i++){if(p.practiceDone[lid+'_'+i])maxDone=i}
    var savedPos=(p.practicePos&&p.practicePos[lid])||0;
    var startPos=Math.max(maxDone+1,savedPos);
    if(startPos>=s.items.length)startPos=s.items.length-1;
    s.current=startPos;peLoad(lid);
}

var QA_STREAM_ENABLED=true,QA_SEARCH_ENABLED=false;
function detectProtocol(url){if(/anthropic/i.test(url))return'anthropic';return'openai'}
function normalizeUrl(url,proto){if(proto==='anthropic'){if(!/\/v1\/messages\/?$/.test(url)){url=url.replace(/\/+$/,'');if(!/\/v1$/.test(url))url+='/v1';url+='/messages'}return url}if(!/\/chat\/completions\/?$/.test(url)){url=url.replace(/\/+$/,'');if(!/\/v1$/.test(url))url+='/v1';url+='/chat/completions'}return url}
function getHeaders(key,proto){if(proto==='anthropic')return{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'};return{'Content-Type':'application/json','Authorization':'Bearer '+key}}
function buildRequestBody(proto,model,msgs,stream){if(proto==='anthropic'){var sys='',user=[];msgs.forEach(function(m){if(m.role==='system')sys+=m.content+'\n';else user.push({role:m.role,content:m.content})});var body={model:model,messages:user,max_tokens:16384};if(sys.trim())body.system=sys.trim();return body}var body={model:model,messages:msgs};if(stream)body.stream=true;return body}
function extractReply(proto,data){if(proto==='anthropic'){if(data.content&&data.content[0]&&data.content[0].text)return data.content[0].text;return null}if(data.choices&&data.choices[0]&&data.choices[0].message){var msg=data.choices[0].message;if(msg.content&&msg.content.trim())return msg.content;if(msg.reasoning_content&&msg.reasoning_content.trim())return'[思考过程]\n'+msg.reasoning_content+'\n\n[提示] 正式回答被截断，请重试';if(data.choices[0].finish_reason==='length')return null;return null}return null}

function aiCall(messages,callback){
    if(!CFG.url||!CFG.key){callback(null,'请先在右上角 ⚙️ 设置中配置 API');return}
    var proto=detectProtocol(CFG.url),finalUrl=normalizeUrl(CFG.url,proto),headers=getHeaders(CFG.key,proto),body=buildRequestBody(proto,CFG.model||'mimo-v2.5-pro',messages,false);
    fetch(finalUrl,{method:'POST',headers:headers,body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){var reply=extractReply(proto,d);if(reply)callback(reply,null);else if(d.error)callback(null,'API 错误：'+(d.error.message||JSON.stringify(d.error)));else callback(null,'API 返回异常：'+JSON.stringify(d).substring(0,500))}).catch(function(e){callback(null,'请求失败：'+e.message)})
}

function aiCallStream(messages,onChunk,onDone){
    if(!CFG.url||!CFG.key){onDone('请先在右上角 ⚙️ 设置中配置 API');return}
    var proto=detectProtocol(CFG.url),finalUrl=normalizeUrl(CFG.url,proto),headers=getHeaders(CFG.key,proto),body=buildRequestBody(proto,CFG.model||'mimo-v2.5-pro',messages,true);
    fetch(finalUrl,{method:'POST',headers:headers,body:JSON.stringify(body)}).then(function(response){
        if(!response.ok){response.text().then(function(t){onDone('HTTP '+response.status+': '+t.substring(0,200))});return}
        var reader=response.body.getReader(),decoder=new TextDecoder(),buffer='',reasoning='',content='';
        function read(){reader.read().then(function(result){
            if(result.done){onDone(null,reasoning,content);return}
            buffer+=decoder.decode(result.value,{stream:true});
            var lines=buffer.split('\n');buffer=lines.pop();
            lines.forEach(function(line){
                line=line.trim();if(!line||!line.startsWith('data:'))return;
                var data=line.substring(5).trim();if(data==='[DONE]')return;
                try{
                    var json=JSON.parse(data);
                    if(json.choices&&json.choices[0]){
                        var delta=json.choices[0].delta||{};
                        if(delta.reasoning_content){reasoning+=delta.reasoning_content;onChunk('reasoning',delta.reasoning_content,reasoning,content)}
                        if(delta.content){content+=delta.content;onChunk('content',delta.content,reasoning,content)}
                    }
                }catch(e){}
            });
            read();
        }).catch(function(e){onDone('读取失败：'+e.message)})}
        read();
    }).catch(function(e){onDone('请求失败：'+e.message)})
}

function skillScan(){var input=document.getElementById('skillRepo').value,branch=document.getElementById('skillBranch').value.trim(),parsed=parseRepoUrl(input),el=document.getElementById('skillScanResult');if(!parsed){el.innerHTML='<div style="color:var(--accent3);font-size:0.85rem">❌ 无法解析地址</div>';return}el.innerHTML='<div class="ai-status">⏳ 扫描中...</div>';var getBranch=branch?Promise.resolve(branch):fetch('https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo).then(function(r){return r.json()}).then(function(d){return d.default_branch||'master'});getBranch.then(function(br){return fetch('https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/git/trees/'+br+'?recursive=1').then(function(r){return r.json()}).then(function(tree){if(!tree.tree){el.innerHTML='<div style="color:var(--accent3);font-size:0.85rem">❌ 无法获取仓库内容</div>';return}var paths=tree.tree.filter(function(f){return f.path.match(/SKILL\.md$/)&&f.type==='blob'});if(!paths.length){el.innerHTML='<div style="color:var(--accent3);font-size:0.85rem">❌ 未找到 SKILL.md</div>';return}var installed=getInstalledSkills();var fetches=paths.map(function(sp){var dir=sp.path.replace('/SKILL.md','');return fetch('https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/contents/'+sp.path+'?ref='+br).then(function(r){return r.json()}).then(function(d){var content=atob(d.content||'');var nm=content.match(/name:\s*(.+)/),dm=content.match(/description:\s*(.+)/);return{name:nm?nm[1].trim():dir.split('/').pop(),desc:dm?dm[1].trim().substring(0,100):'',path:dir,isInstalled:installed.some(function(s){return s.name===(nm?nm[1].trim():'')&&s.repo===parsed.owner+'/'+parsed.repo})}})});Promise.all(fetches).then(function(skills){var html='<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem">找到 '+skills.length+' 个 Skill：</div><div class="skill-list">';skills.forEach(function(s,i){html+='<div class="skill-item">';if(s.isInstalled){html+='<div class="skill-item-info"><div class="skill-item-name">'+esc(s.name)+'</div><div class="skill-item-desc">'+esc(s.desc)+'</div></div><span class="skill-installed">已安装</span>'}else{html+='<input type="checkbox" id="skillCheck'+i+'" checked><div class="skill-item-info"><div class="skill-item-name">'+esc(s.name)+'</div><div class="skill-item-desc">'+esc(s.desc)+'</div></div>'}html+='</div>'});html+='</div><div class="btn-row" style="margin-top:0.8rem"><button class="btn btn-primary" onclick="skillInstall(\''+esc(parsed.owner+'/'+parsed.repo)+'\',\''+esc(br)+'\')">安装选中</button></div>';el.innerHTML=html;window._skillScanResult={repo:parsed.owner+'/'+parsed.repo,branch:br,skills:skills}})})}).catch(function(e){el.innerHTML='<div style="color:var(--accent3);font-size:0.85rem">❌ '+e.message+'</div>'})}

function skillInstall(repo,branch){var scan=window._skillScanResult;if(!scan)return;var toInstall=[];scan.skills.forEach(function(s,i){if(!s.isInstalled){var cb=document.getElementById('skillCheck'+i);if(cb&&cb.checked)toInstall.push(s)}});if(!toInstall.length){alert('请至少选择一个');return}var el=document.getElementById('skillScanResult');el.innerHTML='<div class="ai-status">⏳ 下载中...</div>';var fetches=toInstall.map(function(s){return fetch('https://api.github.com/repos/'+repo+'/contents/'+s.path+'/SKILL.md?ref='+branch).then(function(r){return r.json()}).then(function(d){var content=atob(d.content||'');return fetch('https://api.github.com/repos/'+repo+'/contents/'+s.path+'/references?ref='+branch).then(function(r){return r.ok?r.json():[]}).then(function(refs){if(!Array.isArray(refs))refs=[];return Promise.all(refs.filter(function(f){return f.name.endsWith('.md')}).map(function(f){return fetch(f.download_url).then(function(r){return r.text()}).then(function(t){return{name:f.name,content:t}})})).then(function(rc){return{name:s.name,description:s.desc,repo:repo,branch:branch,skill:content,references:rc,installed:Date.now()}})})})});Promise.all(fetches).then(function(installed){var existing=getInstalledSkills();installed.forEach(function(s){existing=existing.filter(function(e){return!(e.name===s.name&&e.repo===s.repo)});existing.push(s)});saveInstalledSkills(existing);renderInstalledSkills();el.innerHTML='<div style="color:var(--accent);font-size:0.85rem">✅ 安装成功！</div>';window._skillScanResult=null}).catch(function(e){el.innerHTML='<div style="color:var(--accent3);font-size:0.85rem">❌ '+e.message+'</div>'})}

function getSkillContext(){var skills=getInstalledSkills();if(!skills.length)return'';var ctx='\n\n[已安装 Skill]\n';skills.forEach(function(s){ctx+='\n--- '+s.name+' ---\n'+s.skill.substring(0,1500)+'\n';if(s.references)s.references.forEach(function(r){ctx+='['+r.name+']\n'+r.content.substring(0,800)+'\n'})});return ctx}

// ── Q&A Module ──
var qaConversations=[],qaCurrentConv=0;
function qaInit(){var saved=localStorage.getItem('jmc_qa_convs');if(saved)try{qaConversations=JSON.parse(saved)}catch(e){qaConversations=[]}if(!qaConversations.length)qaConversations.push({title:'新会话',messages:[],created:Date.now()});qaCurrentConv=qaConversations.length-1;qaRenderMessages();renderQuickBtns()}
function qaSave(){localStorage.setItem('jmc_qa_convs',JSON.stringify(qaConversations))}
function qaNew(){qaConversations.push({title:'新会话',messages:[],created:Date.now()});qaCurrentConv=qaConversations.length-1;qaSave();qaRenderMessages()}
function qaClear(){if(!confirm('确定清空？'))return;qaConversations[qaCurrentConv].messages=[];qaSave();qaRenderMessages()}
function qaHistory(){var box=document.getElementById('qaMessages'),html='<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.8rem">点击切换会话：</div>';qaConversations.forEach(function(c,i){html+='<div class="qa-msg ai" style="cursor:pointer;margin-bottom:0.5rem'+(i===qaCurrentConv?';border-color:var(--accent2)':'')+'" onclick="qaSwitch('+i+')"><strong>'+esc(c.title)+'</strong><br><span style="font-size:0.78rem;color:var(--text-muted)">'+new Date(c.created).toLocaleString('zh-CN')+' · '+c.messages.length+' 条</span>'+(i===qaCurrentConv?' ← 当前':'')+'</div>'});box.innerHTML=html}
function qaSwitch(idx){qaCurrentConv=idx;qaRenderMessages()}
function qaCompress(){var conv=qaConversations[qaCurrentConv];if(conv.messages.length<2){alert('会话太短');return}qaAddMsg('⏳ 压缩中...','ai',true);var hist='';conv.messages.forEach(function(m){hist+=(m.role==='user'?'用户':'AI')+'：'+m.content+'\n\n'});aiCall([{role:'system',content:AI_CONFIG.compressPrompt},{role:'user',content:'压缩以下对话：\n\n'+hist}],function(result,err){qaRemoveLoading();if(err){qaAddMsg('❌ '+err,'ai');return}conv.title='压缩 · '+new Date().toLocaleTimeString('zh-CN');conv.messages=[{role:'user',content:'[摘要]\n'+result},{role:'assistant',content:'✅ 已压缩'}];qaSave();qaRenderMessages();qaAddMsg('✅ 会话已压缩！','ai')})}

function renderQuickBtns(){var el=document.getElementById('qaQuick'),html='';AI_CONFIG.quickQuestions.forEach(function(q){html+='<button class="qa-quick-btn" onclick="qaQuick(\''+q.text.replace(/'/g,"\\'")+'\')">'+q.label+'</button>'});el.innerHTML=html}

function qaRenderMessages(){var box=document.getElementById('qaMessages'),conv=qaConversations[qaCurrentConv];if(!conv||!conv.messages.length){box.innerHTML='<div class="qa-msg ai" style="font-size:0.85rem;color:var(--text-muted)">你好！有什么问题可以问我。</div>';return}var html='';conv.messages.forEach(function(m){var type=m.role==='user'?'user':'ai';html+='<div class="qa-msg '+(type==='ai'?'ai':'user')+'">'+(type==='ai'?md(m.content):esc(m.content))+'</div>'});box.innerHTML=html;box.querySelectorAll('pre code').forEach(function(b){b.innerHTML=hl(b.textContent)});box.scrollTop=box.scrollHeight}

function qaAsk(){
    var input=document.getElementById('qaInput'),q=input.value.trim();if(!q)return;input.value='';
    var conv=qaConversations[qaCurrentConv];conv.messages.push({role:'user',content:q});
    if(conv.messages.length===1)conv.title=q.substring(0,20);qaSave();qaAddMsg(q,'user');
    var c=COURSE[currentLesson],context='用户正在学习第'+c.id+'课「'+c.title+'」';
    var skillCtx=getSkillContext();
    var sysPrompt=AI_CONFIG.qaSystemPrompt+skillCtx;
    var apiMsgs=[{role:'system',content:sysPrompt}];
    conv.messages.forEach(function(m){apiMsgs.push({role:m.role,content:m.content})});
    apiMsgs[apiMsgs.length-1]={role:'user',content:context+'\n\n问题：'+q};

    var urls=extractUrls(q);
    var needSearch=QA_SEARCH_ENABLED;
    var needFetch=urls.length>0;

    if(needFetch){
        qaAddMsg('🔗 正在抓取网页...','ai',true);
        fetchWebPages(urls,function(pageResults){
            qaRemoveLoading();
            var extra='';
            if(pageResults)extra+='\n\n[网页内容]\n'+pageResults;
            if(needSearch){
                qaAddMsg('🔍 正在搜索...','ai',true);
                webSearch(q,function(searchResults){
                    qaRemoveLoading();
                    if(searchResults)extra+='\n\n[搜索结果]\n'+searchResults;
                    apiMsgs[apiMsgs.length-1]={role:'user',content:context+extra+'\n\n问题：'+q};
                    sendToAI(conv,apiMsgs);
                });
            }else{
                apiMsgs[apiMsgs.length-1]={role:'user',content:context+extra+'\n\n问题：'+q};
                sendToAI(conv,apiMsgs);
            }
        });
    }else if(needSearch){
        qaAddMsg('🔍 正在搜索...','ai',true);
        webSearch(q,function(searchResults){
            qaRemoveLoading();
            if(searchResults)apiMsgs[apiMsgs.length-1]={role:'user',content:context+'\n\n[搜索结果]\n'+searchResults+'\n\n问题：'+q};
            sendToAI(conv,apiMsgs);
        });
    }else{
        sendToAI(conv,apiMsgs);
    }
}

function sendToAI(conv,apiMsgs){
    if(QA_STREAM_ENABLED){qaStreamReply(conv,apiMsgs)}else{qaSendNormal(conv,apiMsgs)}
}

function extractUrls(text){var regex=/https?:\/\/[^\s<>"')\]]+/g;var matches=text.match(regex);return matches?matches.slice(0,3):[]}

function fetchWebPages(urls,callback){
    var results=[],done=0;
    urls.forEach(function(url){
        fetchWebPage(url,function(text,err){
            if(text)results.push('【'+url+'】\n'+text);
            done++;
            if(done>=urls.length){callback(results.length>0?results.join('\n\n'):null)}
        });
    });
}

function fetchWebPage(url,callback){
    var proxy='https://api.allorigins.win/raw?url='+encodeURIComponent(url);
    fetch(proxy).then(function(r){return r.text()}).then(function(html){
        var text=htmlToText(html);
        if(text.length>8000)text=text.substring(0,8000)+'\n...(内容过长，已截断)';
        callback(text,null);
    }).catch(function(e){callback(null,'抓取失败：'+e.message)})
}

function htmlToText(html){
    var tmp=document.createElement('div');
    tmp.innerHTML=html;
    tmp.querySelectorAll('script,style,noscript,iframe,svg,head').forEach(function(el){el.remove()});
    var text=tmp.textContent||tmp.innerText||'';
    text=text.replace(/\s+/g,' ').replace(/\n\s*\n/g,'\n').trim();
    return text;
}

function qaSendNormal(conv,apiMsgs){
    qaAddMsg('⏳ 思考中...','ai',true);
    aiCall(apiMsgs,function(result,err){qaRemoveLoading();if(err){qaAddMsg('❌ '+err,'ai');return}conv.messages.push({role:'assistant',content:result});qaSave();qaAddMsg(result,'ai')})
}

function webSearch(query,callback){
    var url='https://api.duckduckgo.com/?q='+encodeURIComponent(query)+'&format=json&no_html=1&skip_disambig=1&no_redirect=1';
    fetch(url).then(function(r){return r.json()}).then(function(data){
        var results=[];
        if(data.Abstract&&data.Abstract.trim()){results.push('摘要：'+data.Abstract+(data.AbstractSource?' (来源：'+data.AbstractSource+')':''))}
        if(data.AbstractURL){results.push('参考链接：'+data.AbstractURL)}
        if(data.RelatedTopics&&data.RelatedTopics.length>0){
            var topics=[];
            data.RelatedTopics.slice(0,5).forEach(function(t){
                if(t.Text)topics.push('- '+t.Text+(t.FirstURL?' ('+t.FirstURL+')':''));
                if(t.Topics)t.Topics.slice(0,3).forEach(function(st){if(st.Text)topics.push('  - '+st.Text)});
            });
            if(topics.length)results.push('相关主题：\n'+topics.join('\n'));
        }
        if(data.Definition&&data.Definition.trim()){results.push('定义：'+data.Definition+(data.DefinitionSource?' (来源：'+data.DefinitionSource+')':''))}
        if(results.length>0){callback(results.join('\n\n'),null)}
        else{callback(null,'未找到相关结果')}
    }).catch(function(e){callback(null,'搜索失败：'+e.message)})
}

function qaStreamReply(conv,apiMsgs){
    var box=document.getElementById('qaMessages');
    var msgDiv=document.createElement('div');msgDiv.className='qa-msg ai';
    var thinkingDiv=document.createElement('div');thinkingDiv.className='qa-thinking';thinkingDiv.style.display='none';
    var thinkingLabel=document.createElement('div');thinkingLabel.className='qa-thinking-label';thinkingLabel.textContent='💭 思考中...';
    thinkingLabel.onclick=function(){var body=thinkingDiv.querySelector('.qa-thinking-body');if(body)body.classList.toggle('show');thinkingLabel.classList.toggle('open')};
    var thinkingBody=document.createElement('div');thinkingBody.className='qa-thinking-body';
    thinkingDiv.appendChild(thinkingLabel);thinkingDiv.appendChild(thinkingBody);
    var contentDiv=document.createElement('div');contentDiv.className='qa-stream-content';contentDiv.innerHTML='<span style="color:var(--text-muted);font-size:0.85rem">⏳ 生成中...</span>';
    msgDiv.appendChild(thinkingDiv);msgDiv.appendChild(contentDiv);
    box.appendChild(msgDiv);box.scrollTop=box.scrollHeight;
    var reasoning='',content='',started=false;
    aiCallStream(apiMsgs,
        function(type,delta,rFull,cFull){
            if(!started){started=true;contentDiv.innerHTML=''}
            if(type==='reasoning'){
                reasoning=rFull;thinkingDiv.style.display='block';
                thinkingLabel.textContent='💭 思考中... ('+reasoning.length+'字)';
                thinkingBody.innerHTML=md(reasoning);
                box.scrollTop=box.scrollHeight;
            }
            if(type==='content'){
                content=cFull;contentDiv.innerHTML=md(content);
                contentDiv.querySelectorAll('pre code').forEach(function(b){b.innerHTML=hl(b.textContent)});
                box.scrollTop=box.scrollHeight;
            }
        },
        function(err,rFinal,cFinal){
            if(err){contentDiv.innerHTML='<span style="color:var(--accent3)">❌ '+esc(err)+'</span>';return}
            if(rFinal)thinkingLabel.textContent='💭 思考完成 ('+rFinal.length+'字)';
            if(cFinal){conv.messages.push({role:'assistant',content:cFinal});qaSave()}
            else if(rFinal&&!cFinal){contentDiv.innerHTML='<span style="color:var(--text-muted)">💭 思考完成但未生成回答，请重试</span>'}
            box.scrollTop=box.scrollHeight;
        }
    );
}

function qaQuick(q){document.getElementById('qaInput').value=q;qaAsk()}
function qaAddMsg(text,type,isLoading){var box=document.getElementById('qaMessages'),div=document.createElement('div');div.className='qa-msg '+(type==='user'?'user':'ai');if(isLoading)div.id='qaLoading';if(type==='ai'){div.innerHTML=md(text);div.querySelectorAll('pre code').forEach(function(b){b.innerHTML=hl(b.textContent)})}else{div.textContent=text}box.appendChild(div);box.scrollTop=box.scrollHeight}

// ── Markdown Renderer ──
function mdInline(text){if(!text)return'';text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');text=text.replace(/`([^`]+)`/g,'<code>$1</code>');text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');return text}

function md(text){
    if(!text)return'';text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    text=text.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){code=code.replace(/\n$/,'');if(/[├└│─]/.test(code))return'<pre style="line-height:1.6"><code>'+esc(code).replace(/(├── |└── |│   |│   )/g,'<span style="color:var(--accent);opacity:0.6">$1</span>')+'</code></pre>';return'<pre><code>'+hl(code)+'</code></pre>'});
    text=text.replace(/`([^`]+)`/g,function(m,code){return'<code>'+hl(code)+'</code>'});
    text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    text=text.replace(/^### (.+)$/gm,'<h4 style="color:var(--accent);margin:0.8rem 0 0.3rem;font-size:1rem">$1</h4>');
    text=text.replace(/^## (.+)$/gm,'<h3 style="color:var(--accent);margin:0.8rem 0 0.3rem">$1</h3>');
    text=text.replace(/^# (.+)$/gm,'<h3 style="color:var(--accent);margin:0.8rem 0 0.3rem">$1</h3>');
    text=text.replace(/^[\-\*] (.+)$/gm,'• $1');
    text=text.replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--border-light);margin:0.8rem 0">');
    text=text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
    if(CONTENT_CONFIG.pathHighlightRegex)text=text.replace(CONTENT_CONFIG.pathHighlightRegex,'<span class="hl-path">$1</span>');
    text=text.replace(/\n\n/g,'</p><p style="margin:0.5rem 0">');text=text.replace(/\n/g,'<br>');
    return'<p style="margin:0.5rem 0">'+text+'</p>';
}

// ── API Test ──
function showTestResult(text,isErr){var el=document.getElementById('testResult');el.style.display='block';el.style.borderColor=isErr?'var(--accent3)':'var(--accent)';el.style.color=isErr?'var(--accent3)':'var(--text)';el.textContent=text}
function testPing(){var url=document.getElementById('cfgUrl').value.trim(),key=document.getElementById('cfgKey').value.trim();if(!url||!key){showTestResult('请先填写 API 地址和 Key',true);return}var proto=detectProtocol(url);showTestResult('⏳ 测试中...\n协议：'+proto.toUpperCase());var headers=getHeaders(key,proto);var opts={method:proto==='anthropic'?'POST':'GET',headers:headers};if(proto==='anthropic')opts.body=JSON.stringify({model:'test',messages:[{role:'user',content:'hi'}],max_tokens:1});var testUrl=proto==='anthropic'?url:url.replace(/\/chat\/completions$/,'').replace(/\/v1\/?$/,'')+'/v1/models';fetch(testUrl,opts).then(function(r){if(r.ok)showTestResult('✅ 连接成功！状态码：'+r.status);else r.text().then(function(t){showTestResult('⚠️ 状态码：'+r.status+'\n'+t.substring(0,500),r.status!==400||proto!=='anthropic')})}).catch(function(e){showTestResult('❌ '+e.message,true)})}
function testModels(){var url=document.getElementById('cfgUrl').value.trim(),key=document.getElementById('cfgKey').value.trim();if(!url||!key){showTestResult('请先填写',true);return}var proto=detectProtocol(url);if(proto==='anthropic'){showTestResult('ℹ️ Anthropic 无模型列表接口\n常用：claude-sonnet-4-20250514');return}fetch(url.replace(/\/chat\/completions$/,'').replace(/\/v1\/?$/,'')+'/v1/models',{headers:{'Authorization':'Bearer '+key}}).then(function(r){return r.json()}).then(function(d){if(d.data&&d.data.length){var list='✅ '+d.data.length+' 个模型：\n\n';d.data.forEach(function(m,i){list+=(i+1)+'. '+m.id+'\n'});showTestResult(list)}else showTestResult('⚠️ 无模型数据',true)}).catch(function(e){showTestResult('❌ '+e.message,true)})}
function testSend(){var url=document.getElementById('cfgUrl').value.trim(),key=document.getElementById('cfgKey').value.trim(),model=document.getElementById('cfgModel').value.trim();if(!url||!key||!model){showTestResult('请先填写完整',true);return}var proto=detectProtocol(url),finalUrl=normalizeUrl(url,proto);showTestResult('⏳ 发送中...\n协议：'+proto+'\n模型：'+model);var body=buildRequestBody(proto,model,[{role:'system',content:'一句话回答'},{role:'user',content:'1+1=?'}]);fetch(finalUrl,{method:'POST',headers:getHeaders(key,proto),body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){var reply=extractReply(proto,d);if(reply)showTestResult('✅ 成功！\n回复：'+reply+'\n模型：'+(d.model||model));else showTestResult('❌ '+JSON.stringify(d).substring(0,500),true)}).catch(function(e){showTestResult('❌ '+e.message,true)})}
